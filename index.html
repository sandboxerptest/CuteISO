<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CuteISO</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1b1e;
    --sidebar:   #141517;
    --surface:   #25262b;
    --border:    #2c2e33;
    --accent:    #5c7cfa;
    --accent-h:  #748ffc;
    --green:     #51cf66;
    --red:       #ff6b6b;
    --yellow:    #ffd43b;
    --muted:     #5c5f66;
    --text:      #c1c2c5;
    --text-dim:  #868e96;
    --text-hi:   #e8eaed;
    --nick-self: #748ffc;
  }

  /* Fixed mobile viewport handling */
  html, body { 
    height: 100%; 
    height: 100dvh; 
    margin: 0; 
    padding: 0; 
    font-family: "SF Pro Text", "Segoe UI", system-ui, sans-serif; 
    font-size: 14px; 
    background: var(--bg); 
    color: var(--text); 
    overflow: hidden; 
    overscroll-behavior: none; 
  }

  /* ── Layout ─────────────────────────────────────────── */
  #app { 
    display: flex; 
    position: fixed; 
    top: 0; left: 0; right: 0; bottom: 0; 
    overflow: hidden; 
  }

  /* Sidebar */
  #sidebar {
    width: 220px; min-width: 220px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 50;
  }

  /* Logo bar */
  #logo-bar {
    padding: 14px 14px 12px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #logo-bar .logo-wordmark {
    font-size: 15px; font-weight: 800; letter-spacing: -.3px;
    background: linear-gradient(135deg, #748ffc 0%, #5c7cfa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    user-select: none;
  }

  #sidebar-header {
    padding: 8px 12px 8px;
    font-weight: 700; font-size: 13px; letter-spacing: .5px;
    color: var(--text-hi); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  #sidebar-header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); transition: background .3s;
  }
  #sidebar-header .dot.online { background: var(--green); }

  #channel-list { flex: 1; overflow-y: auto; padding: 6px 0; }

  .channel-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; cursor: pointer;
    color: var(--text-dim); font-size: 13px;
    border-left: 3px solid transparent;
    transition: background .15s, color .15s;
    user-select: none;
  }
  .channel-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
  .channel-item.active { background: rgba(92,124,250,.12); color: var(--text-hi); border-left-color: var(--accent); }
  .channel-item .badge {
    margin-left: auto; min-width: 18px; height: 18px;
    background: var(--accent); border-radius: 9px;
    font-size: 11px; font-weight: 700; color: #fff;
    display: flex; align-items: center; justify-content: center; padding: 0 5px;
  }
  .channel-item .icon { font-size: 12px; opacity: .6; }

  #sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--border); }
  #connect-btn {
    width: 100%; padding: 7px; border: none; border-radius: 6px;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  #connect-btn:hover { background: var(--accent-h); }
  #connect-btn.danger { background: var(--red); }
  #connect-btn.danger:hover { background: #ff8787; }

  /* Main chat area */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Mobile Nav Buttons */
  .mobile-nav-btn {
    display: none; background: transparent; border: none;
    color: var(--text-hi); font-size: 22px; cursor: pointer;
    padding: 4px 8px; border-radius: 4px; line-height: 1;
  }
  .mobile-nav-btn:hover { background: rgba(255,255,255,.1); }

  #chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .header-info { flex: 1; min-width: 0; }
  #chat-header .channel-name { font-weight: 700; font-size: 15px; color: var(--text-hi); }
  #chat-header .topic { font-size: 12px; color: var(--text-dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #messages {
    flex: 1; overflow-y: auto; padding: 10px 16px;
    display: flex; flex-direction: column; gap: 1px;
    scroll-behavior: smooth;
  }

  .msg { display: flex; gap: 10px; padding: 3px 6px; border-radius: 4px; line-height: 1.5; }
  .msg:hover { background: rgba(255,255,255,.03); }
  .msg .ts { font-size: 11px; color: var(--muted); min-width: 42px; margin-top: 2px; flex-shrink: 0; }
  .msg .nick { font-weight: 600; min-width: 100px; max-width: 100px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .msg .text { flex: 1; word-break: break-word; }

  .msg.self .nick { color: var(--nick-self); }
  .msg.join  .nick, .msg.join  .text { color: var(--green); font-style: italic; }
  .msg.part  .nick, .msg.part  .text { color: var(--red);   font-style: italic; }
  .msg.quit  .nick, .msg.quit  .text { color: var(--red);   font-style: italic; }
  .msg.notice .text { color: var(--yellow); font-style: italic; }
  .msg.system .nick { color: var(--muted); }
  .msg.system .text { color: var(--muted); font-style: italic; }
  .msg.action .text { color: #cc8eea; font-style: italic; }

  .msg .text a { color: var(--accent-h); }

  /* Nick colors */
  .nc0{color:#e06c75}.nc1{color:#61afef}.nc2{color:#98c379}.nc3{color:#e5c07b}.nc4{color:#c678dd}.nc5{color:#56b6c2}.nc6{color:#d19a66}.nc7{color:#abb2bf}

  /* Input area */
  #input-bar {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex; gap: 8px; align-items: center;
  }
  #input-bar input {
    flex: 1; padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-hi); font-size: 16px; outline: none;
    transition: border-color .15s;
  }
  #input-bar input:focus { border-color: var(--accent); }
  #input-bar input::placeholder { color: var(--muted); }
  #send-btn {
    padding: 9px 16px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .15s; flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent-h); }

  /* User list panel */
  #userlist-panel {
    width: 160px; min-width: 160px;
    background: var(--sidebar);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 50;
  }
  #userlist-header {
    padding: 12px 12px 8px;
    font-size: 12px; font-weight: 700; letter-spacing: .5px;
    color: var(--muted); text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  #user-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .user-item {
    padding: 4px 12px; font-size: 13px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .user-item.op { color: var(--yellow); }
  .user-item.voice { color: var(--green); }

  /* ── Connect Modal ───────────────────────────────────── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  #modal {
    background: var(--surface); border-radius: 12px;
    border: 1px solid var(--border);
    padding: 28px 28px 24px; width: 380px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  #modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text-hi); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
  .field input, .field select {
    width: 100%; padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-hi); font-size: 16px; outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .field-row .field.narrow { flex: 0 0 90px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .btn-primary:hover { background: var(--accent-h); }
  .btn-secondary {
    padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text); font-size: 14px;
    cursor: pointer; transition: background .15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,.06); }

  /* ── DCC ────────────────────────────────────────────── */
  .dcc-offer-box {
    background: rgba(92,124,250,.12); border: 1px solid rgba(92,124,250,.35);
    border-radius: 7px; padding: 10px 14px; margin: 2px 0;
    display: flex; flex-direction: column; gap: 6px;
  }
  .dcc-offer-box .dcc-title { font-weight: 700; color: var(--accent-h); font-size: 13px; }
  .dcc-offer-box .dcc-meta { font-size: 12px; color: var(--text-dim); word-break: break-all; }
  .dcc-offer-box .dcc-btns { display: flex; gap: 8px; margin-top: 2px; }
  .dcc-accept {
    padding: 5px 12px; border: none; border-radius: 5px;
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .dcc-accept:hover { background: var(--accent-h); }
  .dcc-decline {
    padding: 5px 12px; border: 1px solid var(--border); border-radius: 5px;
    background: transparent; color: var(--text-dim); font-size: 12px;
    cursor: pointer; transition: background .15s;
  }
  .dcc-decline:hover { background: rgba(255,255,255,.06); color: var(--text); }
  .dcc-progress-wrap {
    background: var(--border); border-radius: 4px; height: 6px;
    overflow: hidden; margin-top: 4px;
  }
  .dcc-progress-bar {
    height: 100%; background: var(--accent); border-radius: 4px;
    transition: width .3s ease;
  }
  .dcc-status { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* DCC CHAT entries in sidebar */
  .channel-item.dcc-chat-item .icon { opacity: 1; }

  /* DCC banner — hard to miss (Updated to be a clickable shortcut) */
  #dcc-banner {
    display: none; flex-shrink: 0;
    background: linear-gradient(90deg, rgba(92,124,250,.18), rgba(92,124,250,.08));
    border-bottom: 1px solid rgba(92,124,250,.4);
    padding: 10px 16px; gap: 12px; align-items: center;
    cursor: pointer; transition: background 0.2s;
    animation: slideDown .2s ease;
  }
  #dcc-banner:hover { background: linear-gradient(90deg, rgba(92,124,250,.25), rgba(92,124,250,.12)); }
  #dcc-banner.show { display: flex; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  #dcc-banner .dcc-b-icon { font-size: 20px; flex-shrink: 0; }
  #dcc-banner .dcc-b-info { flex: 1; min-width: 0; }
  #dcc-banner .dcc-b-title { font-weight: 700; color: var(--text-hi); font-size: 13px; }
  #dcc-banner .dcc-b-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #dcc-banner .dcc-b-action {
    font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Channel Browser ────────────────────────────────── */
  #browser-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    display: none; align-items: center; justify-content: center;
    z-index: 99;
  }
  #browser-overlay.open { display: flex; }
  #browser-panel {
    background: var(--surface); border-radius: 12px;
    border: 1px solid var(--border);
    width: min(820px, 95vw); height: min(580px, 90vh);
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    overflow: hidden;
  }
  #browser-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #browser-header h3 { font-size: 16px; font-weight: 700; color: var(--text-hi); flex: 1; }
  #browser-search {
    padding: 7px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-hi); font-size: 13px; outline: none; width: 220px;
    transition: border-color .15s;
  }
  #browser-search:focus { border-color: var(--accent); }
  #browser-search::placeholder { color: var(--muted); }
  #browser-refresh {
    padding: 7px 13px; border: 1px solid var(--border); border-radius: 7px;
    background: transparent; color: var(--text); font-size: 13px;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  #browser-refresh:hover { background: rgba(255,255,255,.06); }
  #browser-close {
    width: 28px; height: 28px; border: none; border-radius: 6px;
    background: transparent; color: var(--muted); font-size: 18px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  #browser-close:hover { background: rgba(255,255,255,.08); color: var(--text-hi); }
  #browser-status {
    padding: 4px 20px 8px; font-size: 12px; color: var(--muted);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #browser-table-wrap { flex: 1; overflow-y: auto; }
  #browser-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  #browser-table thead th {
    position: sticky; top: 0;
    background: var(--surface); padding: 8px 12px;
    text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .4px;
    text-transform: uppercase; color: var(--text-dim);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap;
  }
  #browser-table thead th:hover { color: var(--text-hi); }
  #browser-table thead th.sorted { color: var(--accent); }
  #browser-table tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer; }
  #browser-table tbody tr:hover td { background: rgba(255,255,255,.04); }
  #browser-table td { padding: 7px 12px; vertical-align: middle; }
  #browser-table td.td-name { color: var(--accent-h); font-weight: 600; white-space: nowrap; }
  #browser-table td.td-users { color: var(--text-dim); text-align: right; white-space: nowrap; }
  #browser-table td.td-topic { color: var(--text); max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #browser-table td.td-join { text-align: right; white-space: nowrap; }
  .join-btn {
    padding: 4px 10px; border: 1px solid var(--accent); border-radius: 5px;
    background: transparent; color: var(--accent); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .15s, color .15s;
  }
  .join-btn:hover { background: var(--accent); color: #fff; }
  #browser-empty {
    padding: 48px; text-align: center; color: var(--muted); font-size: 14px;
  }
  #list-btn {
    width: 100%; padding: 7px; margin-top: 6px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-dim); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .15s, color .15s;
  }
  #list-btn:hover { background: rgba(255,255,255,.06); color: var(--text-hi); }
  #list-btn:disabled { opacity: .4; cursor: default; }

  /* Placeholder screen */
  #placeholder {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 12px;
  }
  #placeholder .logo { font-size: 48px; }
  #placeholder h3 { font-size: 18px; color: var(--text-dim); }
  #placeholder p { font-size: 13px; text-align: center; max-width: 260px; line-height: 1.6; }

  /* ── Mobile Responsiveness ────────────────────────────── */
  @media (max-width: 768px) {
    .mobile-nav-btn { display: block; }
    
    .msg .ts { display: none; } /* Hide timestamps on mobile for space */
    .msg .nick { min-width: 80px; max-width: 80px; }
    
    /* Sidebars become sliding drawers */
    #sidebar {
      position: absolute; top: 0; bottom: 0; left: -260px;
      width: 260px; transition: left 0.3s ease;
      box-shadow: 5px 0 15px rgba(0,0,0,0.5);
    }
    #sidebar.open { left: 0; }

    #userlist-panel {
      position: absolute; top: 0; bottom: 0; right: -200px;
      width: 200px; transition: right 0.3s ease;
      box-shadow: -5px 0 15px rgba(0,0,0,0.5);
    }
    #userlist-panel.open { right: 0; }

    /* Adjust Browser Modal for mobile */
    #browser-header { flex-wrap: wrap; }
    #browser-search { width: 100%; order: 3; margin-top: 10px; }
    #browser-table td.td-topic { display: none; } /* hide topic in list to save space */
    #browser-table th[data-col="topic"] { display: none; }

    /* Fix Connection Modal inputs */
    .field-row { flex-direction: column; }
    .field-row .field.narrow { flex: auto; }
  }
</style>
</head>
<body>

<div id="browser-overlay">
  <div id="browser-panel">
    <div id="browser-header">
      <h3>Browse Channels</h3>
      <input id="browser-search" type="text" placeholder="Filter channels…" autocomplete="off">
      <button id="browser-refresh">Refresh</button>
      <button id="browser-close">✕</button>
    </div>
    <div id="browser-status">Piping channels…</div>
    <div id="browser-table-wrap">
      <table id="browser-table">
        <thead>
          <tr>
            <th data-col="name">Channel</th>
            <th data-col="users">Users</th>
            <th data-col="topic">Topic</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="browser-tbody"></tbody>
      </table>
      <div id="browser-empty" style="display:none">No channels found.</div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h2>Connect to IRC</h2>

    <div class="field-row">
      <div class="field">
        <label>Server</label>
        <input id="m-host" type="text" value="irc.irchighway.net" placeholder="irc.irchighway.net">
      </div>
      <div class="field narrow">
        <label>Port</label>
        <input id="m-port" type="number" value="6667" placeholder="6667">
      </div>
    </div>

    <div class="field">
      <label>Nickname</label>
      <input id="m-nick" type="text" value="Adrenelin" placeholder="YourNick" maxlength="30">
    </div>

    <div class="field">
      <label>Channel (optional)</label>
      <input id="m-channel" type="text" value="#Ebooks" placeholder="#general">
    </div>

    <div class="field">
      <label>Real name (optional)</label>
      <input id="m-realname" type="text" placeholder="CuteISO User">
    </div>

    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;">
        <input id="m-ssl" type="checkbox" style="width:auto"> Use SSL/TLS (port 6697)
      </label>
    </div>

    <div class="modal-actions">
      <button class="btn-primary" id="modal-connect-btn">Connect</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="logo-bar">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="34" height="34" rx="9" fill="#5c7cfa"/>
        <rect width="34" height="34" rx="9" fill="white" fill-opacity="0.07"/>
        <rect x="4" y="13" width="26" height="8" rx="4" fill="white"/>
        <circle cx="8" cy="17" r="2.5" fill="#5c7cfa"/>
        <circle cx="26" cy="17" r="2.5" fill="#5c7cfa"/>
        <circle cx="13" cy="17" r="1.6" fill="#5c7cfa" opacity="0.35"/>
        <circle cx="17" cy="17" r="1.6" fill="#5c7cfa"/>
        <circle cx="21" cy="17" r="1.6" fill="#5c7cfa" opacity="0.35"/>
      </svg>
      <span class="logo-wordmark">CuteISO</span>
    </div>
    <div id="sidebar-header">
      <span class="dot" id="status-dot"></span>
      <span id="server-label">Not connected</span>
    </div>
    <div id="channel-list"></div>
    <div id="sidebar-footer">
      <button id="connect-btn">Connect</button>
      <button id="list-btn" disabled>Browse Channels</button>
    </div>
  </div>

  <div id="main">
    <div id="placeholder">
      <div class="logo">💬</div>
      <h3>CuteISO</h3>
      <p>Pipe into a server and join a channel to start chatting.</p>
    </div>

    <div id="chat-area" style="display:none;flex:1;flex-direction:column;min-height:0;">
      <div id="dcc-banner" title="Click to view file offer">
        <span class="dcc-b-icon">📥</span>
        <div class="dcc-b-info">
          <div class="dcc-b-title" id="dcc-b-title">Incoming file transfer</div>
          <div class="dcc-b-meta" id="dcc-b-meta"></div>
        </div>
        <div class="dcc-b-action">View →</div>
      </div>
      <div id="chat-header">
        <button id="mobile-sidebar-btn" class="mobile-nav-btn">☰</button>
        <div class="header-info">
          <div class="channel-name" id="header-channel">#channel</div>
          <div class="topic" id="header-topic"></div>
        </div>
        <button id="mobile-users-btn" class="mobile-nav-btn">👥</button>
      </div>
      <div id="messages"></div>
      <div id="input-bar">
        <input id="msg-input" type="text" placeholder="Type a message… (/join #chan)" autocomplete="off">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <div id="userlist-panel">
    <div id="userlist-header">Users</div>
    <div id="user-list"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────
const state = {
  ws: null,
  connected: false,
  nick: '',
  server: '',
  activeChannel: null,

  // { '#channel': { messages: [], users: Set, topic: '', unread: 0 } }
  channels: {},

  // server messages (before any channel is joined)
  serverBuffer: { messages: [], users: new Set(), topic: '', unread: 0 },

  // channel browser
  browser: { entries: [], loading: false, sortCol: 'users', sortAsc: false, filter: '' },

  autoJoin: null,   // channel to join once server sends 001

  // DCC sessions: { [session_id]: { nick, kind, filename, size, received, closed, messages[] } }
  dccChats: {},
  activeDccSession: null,   // session_id when a DCC CHAT buffer is active
  
  // File chunk storage
  dccBuffers: {},
  
  // Keep connection alive
  pingInterval: null,
};

// ── DOM refs ─────────────────────────────────────────────
const $modal        = document.getElementById('modal-overlay');
const $channelList  = document.getElementById('channel-list');
const $messages     = document.getElementById('messages');
const $msgInput     = document.getElementById('msg-input');
const $sendBtn      = document.getElementById('send-btn');
const $connectBtn   = document.getElementById('connect-btn');
const $statusDot    = document.getElementById('status-dot');
const $serverLabel  = document.getElementById('server-label');
const $headerChan   = document.getElementById('header-channel');
const $headerTopic  = document.getElementById('header-topic');
const $userList     = document.getElementById('user-list');
const $placeholder  = document.getElementById('placeholder');
const $chatArea     = document.getElementById('chat-area');

// ── Nick colour ──────────────────────────────────────────
function nickColor(nick) {
  let h = 0;
  for (let i = 0; i < nick.length; i++) h = (h * 31 + nick.charCodeAt(i)) & 0xffffffff;
  return `nc${Math.abs(h) % 8}`;
}

// ── Time ─────────────────────────────────────────────────
function ts() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Escape HTML ──────────────────────────────────────────
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function stripCodes(text) {
  return text
    .replace(/\x03\d{1,2}(?:,\d{1,2})?/g, '')  // mIRC color codes \x03fg[,bg]
    .replace(/[\x02\x0f\x16\x1d\x1f]/g, '');    // bold, reset, reverse, italic, underline
}

function linkify(text) {
  return esc(stripCodes(text)).replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

// ── Buffer management ────────────────────────────────────
function getBuffer(name) {
  if (!name) return state.serverBuffer;
  if (!state.channels[name]) {
    state.channels[name] = { messages: [], users: new Set(), topic: '', unread: 0 };
  }
  return state.channels[name];
}

function addMessage(target, msgObj) {
  const buf = getBuffer(target);
  buf.messages.push(msgObj);
  if (target !== state.activeChannel) {
    buf.unread++;
  }
  if (target === state.activeChannel || (!state.activeChannel && !target)) {
    renderMessage(msgObj);
    $messages.scrollTop = $messages.scrollHeight;
  }
  renderSidebar();
}

// ── Render ───────────────────────────────────────────────
function renderMessage(m) {
  const div = document.createElement('div');
  div.className = `msg ${m.cls || ''}`;
  div.innerHTML = `<span class="ts">${m.ts}</span><span class="nick ${m.nc||''}">${esc(m.nick||'')}</span><span class="text">${m.html}</span>`;
  $messages.appendChild(div);
}

function renderMessages(target) {
  $messages.innerHTML = '';
  const buf = getBuffer(target);
  buf.messages.forEach(renderMessage);
  $messages.scrollTop = $messages.scrollHeight;
}

function renderSidebar() {
  $channelList.innerHTML = '';

  // Server buffer entry
  const srv = document.createElement('div');
  srv.className = `channel-item${state.activeChannel === null ? ' active' : ''}`;
  srv.innerHTML = `<span class="icon">⚡</span> Server`;
  if (state.serverBuffer.unread > 0) {
    srv.innerHTML += `<span class="badge">${state.serverBuffer.unread}</span>`;
  }
  srv.addEventListener('click', () => switchChannel(null));
  $channelList.appendChild(srv);

  Object.keys(state.channels).sort().forEach(ch => {
    const buf = state.channels[ch];
    const item = document.createElement('div');
    item.className = `channel-item${state.activeChannel === ch && !state.activeDccSession ? ' active' : ''}`;
    item.innerHTML = `<span class="icon">#</span>${esc(ch.replace(/^#/,''))}`;
    if (buf.unread > 0) item.innerHTML += `<span class="badge">${buf.unread}</span>`;
    item.addEventListener('click', () => switchChannel(ch));
    $channelList.appendChild(item);
  });

  // DCC CHAT sessions
  Object.entries(state.dccChats).forEach(([sid, s]) => {
    const item = document.createElement('div');
    const isActive = state.activeDccSession === sid;
    item.className = `channel-item dcc-chat-item${isActive ? ' active' : ''}`;
    const label = s.closed ? `${esc(s.nick)} [ended]` : esc(s.nick);
    item.innerHTML = `<span class="icon">⇄</span>${label}`;
    if (s.unread > 0) item.innerHTML += `<span class="badge">${s.unread}</span>`;
    item.addEventListener('click', () => switchDccChat(sid));
    $channelList.appendChild(item);
  });
}

function renderUserList(target) {
  const buf = getBuffer(target);
  const users = [...(buf.users || [])].sort((a,b) => {
    const rank = s => s.startsWith('@') ? 0 : s.startsWith('+') ? 1 : 2;
    return rank(a) - rank(b) || a.toLowerCase().localeCompare(b.toLowerCase());
  });
  $userList.innerHTML = users.map(u => {
    const cls = u.startsWith('@') ? 'op' : u.startsWith('+') ? 'voice' : '';
    return `<div class="user-item ${cls}">${esc(u)}</div>`;
  }).join('');
}

function switchChannel(target) {
  state.activeChannel = target;
  state.activeDccSession = null;
  const buf = getBuffer(target);
  buf.unread = 0;

  $headerChan.textContent = target || state.server;
  $headerTopic.textContent = buf.topic || '';
  $msgInput.placeholder = target
    ? `Message ${target}…`
    : 'Type a command… (/join #channel, /list, /nick newnick)';

  renderMessages(target);
  renderUserList(target);
  renderSidebar();

  if (target) showChat();
  
  // Hide mobile panels when a channel is selected
  closeMobilePanels();
}

function switchDccChat(sid) {
  const s = state.dccChats[sid];
  if (!s) return;
  state.activeDccSession = sid;
  state.activeChannel = null;

  s.unread = 0;
  $headerChan.textContent = `DCC: ${s.nick}`;
  $headerTopic.textContent = s.closed ? 'Session ended' : 'FServ / DCC Chat — type commands below';
  $msgInput.placeholder = s.closed ? '(session ended)' : 'Type a command… (ls, cd, get filename)';

  $messages.innerHTML = '';
  s.messages.forEach(renderMessage);
  $messages.scrollTop = $messages.scrollHeight;
  renderUserList(null);
  renderSidebar();
  showChat();
  
  closeMobilePanels();
}

function showChat() {
  $placeholder.style.display = 'none';
  $chatArea.style.display = 'flex';
}

// ── IRC message parser ───────────────────────────────────
// :prefix CMD [params] [:trailing]
function parseIRC(raw) {
  let prefix = '', cmd, params = [], trailing = '';
  let i = 0;
  if (raw[0] === ':') {
    const sp = raw.indexOf(' ');
    prefix = raw.slice(1, sp);
    raw = raw.slice(sp + 1);
  }
  if (raw.includes(' :')) {
    const idx = raw.indexOf(' :');
    trailing = raw.slice(idx + 2);
    raw = raw.slice(0, idx);
  }
  const parts = raw.trim().split(' ');
  cmd = parts[0].toUpperCase();
  params = parts.slice(1).filter(Boolean);
  if (trailing) params.push(trailing);
  const nick = prefix.split('!')[0];
  return { prefix, nick, cmd, params };
}

function handleRaw(raw) {
  const { nick, cmd, params } = parseIRC(raw);

  switch (cmd) {
    // Welcome
    case '001':
      addMessage(null, { ts: ts(), nick: '●', html: linkify(params[params.length-1]), cls: 'system' });
      if (state.autoJoin) { sendRaw(`JOIN ${state.autoJoin}`); state.autoJoin = null; }
      break;
    case '002':
    case '003':
    case '004':
      addMessage(null, { ts: ts(), nick: '●', html: linkify(params[params.length-1]), cls: 'system' });
      break;

    // MOTD lines
    case '372':
    case '375':
    case '376':
      addMessage(null, { ts: ts(), nick: '●', html: linkify(params[params.length-1]), cls: 'system' });
      break;

    // Topic
    case '332': {
      const ch = params[1]; const topic = params[params.length-1];
      getBuffer(ch).topic = topic;
      if (state.activeChannel === ch) $headerTopic.textContent = topic;
      addMessage(ch, { ts: ts(), nick: '●', html: `Topic: ${linkify(topic)}`, cls: 'system' });
      break;
    }

    // Names list
    case '353': {
      const ch = params[params.length-2];
      const names = params[params.length-1].split(' ').filter(Boolean);
      const buf = getBuffer(ch);
      names.forEach(n => buf.users.add(n));
      if (state.activeChannel === ch) renderUserList(ch);
      break;
    }

    // End of names
    case '366':
      renderSidebar();
      break;

    // Nick in use
    case '433':
      addMessage(null, { ts: ts(), nick: '✖', html: `Nickname already in use.`, cls: 'notice' });
      break;

    // JOIN
    case 'JOIN': {
      const ch = params[0];
      const buf = getBuffer(ch);
      if (nick === state.nick) {
        // We joined
        renderSidebar();
        switchChannel(ch);
        addMessage(ch, { ts: ts(), nick: '→', html: `You joined ${esc(ch)}`, cls: 'join' });
      } else {
        buf.users.add(nick);
        if (state.activeChannel === ch) renderUserList(ch);
        addMessage(ch, { ts: ts(), nick: '→', html: `${esc(nick)} joined`, cls: 'join' });
      }
      break;
    }

    // PART
    case 'PART': {
      const ch = params[0];
      const reason = params[1] || '';
      const buf = getBuffer(ch);
      if (nick === state.nick) {
        delete state.channels[ch];
        if (state.activeChannel === ch) state.activeChannel = null;
        renderSidebar();
      } else {
        buf.users.delete(nick);
        if (state.activeChannel === ch) renderUserList(ch);
        addMessage(ch, { ts: ts(), nick: '←', html: `${esc(nick)} left${reason ? ': '+esc(reason) : ''}`, cls: 'part' });
      }
      break;
    }

    // QUIT
    case 'QUIT': {
      const reason = params[0] || '';
      Object.keys(state.channels).forEach(ch => {
        const buf = state.channels[ch];
        if (buf.users.has(nick)) {
          buf.users.delete(nick);
          addMessage(ch, { ts: ts(), nick: '←', html: `${esc(nick)} quit${reason ? ': '+esc(reason) : ''}`, cls: 'quit' });
          if (state.activeChannel === ch) renderUserList(ch);
        }
      });
      break;
    }

    // NICK change
    case 'NICK': {
      const newNick = params[0];
      if (nick === state.nick) state.nick = newNick;
      Object.keys(state.channels).forEach(ch => {
        const buf = state.channels[ch];
        if (buf.users.has(nick)) {
          buf.users.delete(nick);
          // Preserve op/voice sigils
          buf.users.add(newNick);
          addMessage(ch, { ts: ts(), nick: '~', html: `${esc(nick)} is now known as ${esc(newNick)}`, cls: 'system' });
          if (state.activeChannel === ch) renderUserList(ch);
        }
      });
      break;
    }

    // KICK
    case 'KICK': {
      const ch = params[0]; const kicked = params[1]; const reason = params[2] || '';
      const buf = getBuffer(ch);
      buf.users.delete(kicked);
      if (kicked === state.nick) {
        addMessage(ch, { ts: ts(), nick: '✖', html: `You were kicked from ${esc(ch)} by ${esc(nick)}${reason ? ': '+esc(reason): ''}`, cls: 'notice' });
        delete state.channels[ch];
        if (state.activeChannel === ch) state.activeChannel = null;
        renderSidebar();
      } else {
        if (state.activeChannel === ch) renderUserList(ch);
        addMessage(ch, { ts: ts(), nick: '✖', html: `${esc(kicked)} was kicked by ${esc(nick)}${reason ? ': '+esc(reason) : ''}`, cls: 'notice' });
      }
      break;
    }

    // TOPIC change
    case 'TOPIC': {
      const ch = params[0]; const topic = params[1] || '';
      getBuffer(ch).topic = topic;
      if (state.activeChannel === ch) $headerTopic.textContent = topic;
      addMessage(ch, { ts: ts(), nick: '●', html: `${esc(nick)} set topic: ${linkify(topic)}`, cls: 'system' });
      break;
    }

    // PRIVMSG
    case 'PRIVMSG': {
      const target = params[0];
      const text = params[1] || '';
      const isCTCP = text.startsWith('\x01') && text.endsWith('\x01');
      const ch = target.startsWith('#') || target.startsWith('&') ? target : nick;

      if (isCTCP) {
        const inner = text.slice(1, -1);
        if (inner.startsWith('ACTION ')) {
          addMessage(ch, { ts: ts(), nick: `* ${nick}`, html: linkify(inner.slice(7)), cls: 'action', nc: nickColor(nick) });
        } else if (/^DCC\s+SEND\s/i.test(inner)) {
          // Bridge should catch this first, but handle it here as a fallback
          const parts = inner.replace(/^DCC\s+SEND\s+/i, '').match(/^(".*?"|[^\s]+)\s+([\d.]+)\s+(\d+)\s*(\d*)$/);
          if (parts) {
            const filename = parts[1].replace(/^"|"$/g, '');
            const size = parseInt(parts[4]) || 0;
            showDccBanner({ session_id: '_fallback_' + Date.now(), nick, kind: 'SEND', filename, size, ip: parts[2], port: parseInt(parts[3]) });
          }
        } else if (/^DCC\s+CHAT\s/i.test(inner)) {
          const parts = inner.split(/\s+/);
          showDccBanner({ session_id: '_fallback_' + Date.now(), nick, kind: 'CHAT', filename: '', size: 0, ip: parts[2], port: parseInt(parts[3]) });
        }
        break;
      }

      const isSelf = nick === state.nick;
      addMessage(ch, {
        ts: ts(),
        nick,
        html: linkify(text),
        cls: isSelf ? 'self' : '',
        nc: isSelf ? '' : nickColor(nick),
      });
      break;
    }

    // NOTICE — channel notices stay in channel; private notices go to the sender's query buffer
    case 'NOTICE': {
      const target = params[0];
      const text = params[1] || '';
      let ch;
      if (target.startsWith('#') || target.startsWith('&')) {
        ch = target;
      } else if (nick && nick !== state.server && !nick.includes('.')) {
        ch = nick;   // private notice from a bot → open/use a query window
      } else {
        ch = null;   // server notice → server buffer
      }
      addMessage(ch, { ts: ts(), nick: nick || '●', html: linkify(text), cls: 'notice' });
      break;
    }

    // MODE
    case 'MODE': {
      const target = params[0];
      const modeStr = params.slice(1).join(' ');
      if (target.startsWith('#') || target.startsWith('&')) {
        addMessage(target, { ts: ts(), nick: '●', html: `Mode ${esc(modeStr)} set by ${esc(nick)}`, cls: 'system' });
      }
      break;
    }

    // LIST entry: 322 nick #channel usercount :topic
    case '322': {
      const name = params[1];
      const users = parseInt(params[2], 10) || 0;
      const topic = params[3] || '';
      state.browser.entries.push({ name, users, topic });
      document.getElementById('browser-status').textContent =
        `Piping… ${state.browser.entries.length} channels found`;
      break;
    }

    // End of LIST
    case '323':
      state.browser.loading = false;
      renderBrowser();
      break;

    // Ignore numeric spam
    case '251': case '252': case '253': case '254': case '255':
    case '265': case '266': case '250': case '396':
    case '005': case '042':
      break;

    default:
      // Show unknown numerics as system messages in server buffer
      if (/^\d{3}$/.test(cmd) && params.length) {
        addMessage(null, { ts: ts(), nick: '●', html: esc(params[params.length-1]), cls: 'system' });
      }
  }
}

// ── WebSocket ────────────────────────────────────────────
function connectWS(opts) {
  const ws = new WebSocket(opts.bridge);
  state.ws = ws;

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type: 'connect',
      host: opts.host,
      port: opts.port,
      nick: opts.nick,
      username: opts.nick,
      realname: opts.realname || 'CuteISO',
      ssl: opts.ssl,
    }));
    
    // Heartbeat to keep the cloud proxy open
    state.pingInterval = setInterval(() => {
      sendWs({ type: 'ping' });
    }, 45000);
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'connected') {
      state.connected = true;
      $statusDot.classList.add('online');
      $serverLabel.textContent = opts.host;
      $connectBtn.textContent = 'Disconnect';
      $connectBtn.classList.add('danger');
      $listBtn.disabled = false;
      addMessage(null, { ts: ts(), nick: '✓', html: `Piping to ${esc(opts.host)}`, cls: 'join' });
      if (opts.channel) state.autoJoin = opts.channel;
      showChat();
      switchChannel(null);
    } else if (msg.type === 'raw') {
      handleRaw(msg.data);
    } else if (msg.type === 'error') {
      addMessage(null, { ts: ts(), nick: '✖', html: esc(msg.data), cls: 'notice' });
    } else if (msg.type === 'disconnected') {
      onDisconnect(msg.data);

    // ── DCC ────────────────────────────────────────────
    } else if (msg.type === 'dcc_offer') {
      handleDccOffer(msg);
    } else if (msg.type === 'dcc_progress') {
      handleDccProgress(msg);
    } else if (msg.type === 'dcc_data') {
      try {
        if (!state.dccBuffers[msg.session_id]) {
          state.dccBuffers[msg.session_id] = [];
        }
        // Mobile Fix: Just store the raw string for now. 
        // Do NOT decode it here, as it blocks the UI thread and freezes the progress bar.
        state.dccBuffers[msg.session_id].push(msg.data);
      } catch (err) {
        console.error("DCC Data Error:", err);
      }
    } else if (msg.type === 'dcc_complete') {
      handleDccComplete(msg);
    } else if (msg.type === 'dcc_error') {
      handleDccError(msg);
    } else if (msg.type === 'dcc_chat_open') {
      handleDccChatOpen(msg);
    } else if (msg.type === 'dcc_chat_msg') {
      handleDccChatMsg(msg);
    } else if (msg.type === 'dcc_chat_closed') {
      handleDccChatClosed(msg);
    }
  };

  ws.onclose = () => onDisconnect('WebSocket closed');
  ws.onerror = () => onDisconnect('WebSocket error');
}

function onDisconnect(reason) {
  // Stop the heartbeat
  if (state.pingInterval) clearInterval(state.pingInterval);

  state.connected = false;
  state.ws = null;
  state.dccChats = {};
  state.activeDccSession = null;
  $statusDot.classList.remove('online');
  $serverLabel.textContent = 'Not connected';
  $connectBtn.textContent = 'Connect';
  $connectBtn.classList.remove('danger');
  $listBtn.disabled = true;
  closeBrowser();
  addMessage(null, { ts: ts(), nick: '✖', html: esc(reason || 'Disconnected'), cls: 'notice' });
}

function sendRaw(line) {
  sendWs({ type: 'send', data: line });
}

// ── Input handling ───────────────────────────────────────
function handleInput() {
  const val = $msgInput.value.trim();
  if (!val) return;
  $msgInput.value = '';

  // If we're in a DCC CHAT session, relay text directly to it
  if (state.activeDccSession) {
    const s = state.dccChats[state.activeDccSession];
    if (s && !s.closed) {
      const m = { ts: ts(), nick: state.nick, html: esc(val), cls: 'self' };
      s.messages.push(m);
      renderMessage(m);
      $messages.scrollTop = $messages.scrollHeight;
      sendWs({ type: 'dcc_chat_send', session_id: state.activeDccSession, text: val });
    }
    return;
  }

  if (val.startsWith('/')) {
    const parts = val.slice(1).split(' ');
    const cmd = parts[0].toUpperCase();
    const rest = parts.slice(1).join(' ');

    switch (cmd) {
      case 'JOIN':
        sendRaw(`JOIN ${rest}`);
        break;
      case 'PART':
        sendRaw(`PART ${state.activeChannel || rest}`);
        break;
      case 'NICK':
        sendRaw(`NICK ${rest}`);
        state.nick = rest;
        break;
      case 'ME':
        if (state.activeChannel) {
          sendRaw(`PRIVMSG ${state.activeChannel} :\x01ACTION ${rest}\x01`);
          addMessage(state.activeChannel, { ts: ts(), nick: `* ${state.nick}`, html: linkify(rest), cls: 'action' });
        }
        break;
      case 'MSG':
      case 'QUERY': {
        const [target, ...msgParts] = rest.split(' ');
        const text = msgParts.join(' ');
        sendRaw(`PRIVMSG ${target} :${text}`);
        addMessage(target, { ts: ts(), nick: state.nick, html: linkify(text), cls: 'self' });
        switchChannel(target);
        break;
      }
      case 'TOPIC':
        sendRaw(`TOPIC ${state.activeChannel} :${rest}`);
        break;
      case 'KICK': {
        const [kickNick, ...reason] = rest.split(' ');
        sendRaw(`KICK ${state.activeChannel} ${kickNick} :${reason.join(' ')}`);
        break;
      }
      case 'LIST':
        openBrowser();
        break;
      case 'QUOTE':
      case 'RAW':
        sendRaw(rest);
        break;
      default:
        sendRaw(val.slice(1)); // pass through unknown commands
    }
  } else {
    // Normal message to active channel
    const target = state.activeChannel;
    if (!target) {
      addMessage(null, { ts: ts(), nick: '●', html: 'Pipe into a channel first.', cls: 'system' });
      return;
    }
    sendRaw(`PRIVMSG ${target} :${val}`);
    addMessage(target, { ts: ts(), nick: state.nick, html: linkify(val), cls: 'self' });
  }
}

// ── Modal ────────────────────────────────────────────────
document.getElementById('modal-connect-btn').addEventListener('click', () => {
  const host = document.getElementById('m-host').value.trim();
  const nick = document.getElementById('m-nick').value.trim();
  
  // HARDCODED BRIDGE URL HERE
  const bridge = 'wss://cuteiso.onrender.com'; 
  
  if (!host || !nick) { alert('Server and Nickname are required.'); return; }
  
  const ssl = document.getElementById('m-ssl').checked;
  const port = parseInt(document.getElementById('m-port').value) || (ssl ? 6697 : 6667);
  const channel = document.getElementById('m-channel').value.trim();
  const realname = document.getElementById('m-realname').value.trim() || 'CuteISO';

  state.nick = nick;
  state.server = host;
  $modal.style.display = 'none';
  connectWS({ host, port, nick, realname, channel, ssl, bridge });
});

document.getElementById('m-ssl').addEventListener('change', function() {
  const portField = document.getElementById('m-port');
  if (this.checked && portField.value === '6667') portField.value = '6697';
  else if (!this.checked && portField.value === '6697') portField.value = '6667';
});

$connectBtn.addEventListener('click', () => {
  if (state.connected) {
    if (state.ws) {
      state.ws.send(JSON.stringify({ type: 'disconnect' }));
      state.ws.close();
    }
    state.channels = {};
    state.serverBuffer = { messages: [], users: new Set(), topic: '', unread: 0 };
    renderSidebar();
  } else {
    $modal.style.display = 'flex';
  }
});

$sendBtn.addEventListener('click', handleInput);
$msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleInput(); });

// Tab-complete
$msgInput.addEventListener('keydown', e => {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const val = $msgInput.value;
  const lastWord = val.split(' ').pop();
  if (!lastWord || !state.activeChannel) return;
  const users = [...(getBuffer(state.activeChannel).users || [])].map(u => u.replace(/^[@+]/, ''));
  const match = users.find(u => u.toLowerCase().startsWith(lastWord.toLowerCase()));
  if (match) {
    $msgInput.value = val.slice(0, val.length - lastWord.length) + match + (val.includes(' ') ? ' ' : ': ');
  }
});

// ── DCC handlers ─────────────────────────────────────────
function fmtSize(n) {
  if (!n) return '';
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n/1024).toFixed(1)} KB`;
  return `${(n/1024/1024).toFixed(2)} MB`;
}

// Pending banner offer (one at a time shown; queue the rest)
const dccQueue = [];
let dccBannerActive = null;

function showDccBanner(msg) {
  dccQueue.push(msg);
  if (!dccBannerActive) pumpDccBanner();
}

function pumpDccBanner() {
  if (!dccQueue.length) { dccBannerActive = null; return; }
  dccBannerActive = dccQueue.shift();
  const m = dccBannerActive;
  const isSend = m.kind === 'SEND';
  document.getElementById('dcc-b-title').textContent =
    isSend ? `📥 Piping file from ${m.nick}` : `💬 Piping chat from ${m.nick}`;
  document.getElementById('dcc-b-meta').textContent =
    isSend ? `${m.filename}${m.size ? '  ·  ' + fmtSize(m.size) : ''}` : 'FServ / direct chat session';
  document.getElementById('dcc-banner').classList.add('show');
  showChat();
}

function dismissBanner() {
  document.getElementById('dcc-banner').classList.remove('show');
  dccBannerActive = null;
  setTimeout(pumpDccBanner, 150);
}

// ── Banner Navigation Logic ─────────────────────────────
document.getElementById('dcc-banner').addEventListener('click', () => {
  if (!dccBannerActive) return;
  
  const nick = dccBannerActive.nick;
  
  // Instantly switch the user to the private chat buffer with the sender
  switchChannel(nick);
  
  // Dismiss the banner
  dismissBanner();
});

function handleDccOffer(msg) {
  showDccBanner(msg);
  // Also log it in the bot's query buffer as a record
  const target = msg.nick;
  const isSend = msg.kind === 'SEND';
  const meta = isSend
    ? `File: <strong>${esc(msg.filename)}</strong> &nbsp;·&nbsp; ${fmtSize(msg.size)}`
    : `FServ / DCC Chat from <strong>${esc(msg.nick)}</strong>`;
  const html = `
    <div class="dcc-offer-box" id="dcc-offer-${esc(msg.session_id)}">
      <div class="dcc-title">${isSend ? '📥 Piping File' : '💬 Piping Chat'}</div>
      <div class="dcc-meta">${meta}</div>
      <div class="dcc-btns">
        <button class="dcc-accept" data-sid="${esc(msg.session_id)}" data-kind="${esc(msg.kind)}">Accept</button>
        <button class="dcc-decline" data-sid="${esc(msg.session_id)}">Decline</button>
      </div>
    </div>`;
  addMessage(target, { ts: ts(), nick: '⇄', html, cls: 'system' });
}

function handleDccProgress(msg) {
  const pct = msg.total > 0 ? Math.round(msg.received * 100 / msg.total) : 0;
  const el = document.getElementById(`dcc-prog-${msg.session_id}`);
  if (el) {
    el.querySelector('.dcc-progress-bar').style.width = `${pct}%`;
    el.querySelector('.dcc-status').textContent =
      `${fmtSize(msg.received)} / ${fmtSize(msg.total)} (${pct}%)`;
  }
}

function handleDccComplete(msg) {
  const offerEl = document.getElementById(`dcc-offer-${msg.session_id}`);
  if (!offerEl) return;

  if (state.dccBuffers[msg.session_id] && state.dccBuffers[msg.session_id].length > 0) {
    
    // 1. Show processing status before locking the phone's CPU
    offerEl.innerHTML = `
      <div class="dcc-title">⏳ Processing file...</div>
      <div class="dcc-meta">Please wait a moment while your device builds the file.</div>
    `;

    // 2. Use a tiny setTimeout to let the browser update the screen before doing the heavy math
    setTimeout(() => {
      try {
        const chunks = state.dccBuffers[msg.session_id];
        const byteArrays = [];

        // 3. Decode all chunks now that the network is quiet
        for (let i = 0; i < chunks.length; i++) {
          const b64 = chunks[i];
          const byteCharacters = atob(b64);
          const byteArray = new Uint8Array(byteCharacters.length);
          for (let j = 0; j < byteCharacters.length; j++) {
            byteArray[j] = byteCharacters.charCodeAt(j);
          }
          byteArrays.push(byteArray);
        }

        // 4. Build the final file
        const blob = new Blob(byteArrays, { type: "application/octet-stream" });
        const url = URL.createObjectURL(blob);

        offerEl.innerHTML = `
          <div class="dcc-title">✅ Transfer complete</div>
          <div class="dcc-meta"><strong>${esc(msg.filename)}</strong> &nbsp;·&nbsp; ${fmtSize(msg.size)}</div>
          <a href="${url}" download="${esc(msg.filename)}" class="dcc-accept" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center; margin-top:8px;">
            💾 Save to Device
          </a>
        `;

        // Free the raw memory chunks to keep the mobile browser from crashing
        delete state.dccBuffers[msg.session_id]; 
      } catch (err) {
        offerEl.innerHTML = `<div class="dcc-meta" style="color:var(--red); margin-top:6px;"><b>Error compiling file:</b> ${err.message}</div>`;
      }
    }, 50);

  } else {
     offerEl.innerHTML = `
      <div class="dcc-title">❌ Transfer failed</div>
      <div class="dcc-meta" style="color:var(--red); margin-top:6px;"><b>Error:</b> No file data received.</div>
    `;
  }
}

function handleDccError(msg) {
  const offerEl = document.getElementById(`dcc-offer-${msg.session_id}`);
  if (offerEl) {
    offerEl.innerHTML = `
      <div class="dcc-title" style="color:var(--red)">✖ DCC Error</div>
      <div class="dcc-meta">${esc(msg.data)}</div>`;
  } else {
    addMessage(null, { ts: ts(), nick: '✖', html: `DCC error: ${esc(msg.data)}`, cls: 'notice' });
  }
}

function handleDccChatOpen(msg) {
  state.dccChats[msg.session_id] = {
    nick: msg.nick, closed: false, messages: [], unread: 0,
  };
  renderSidebar();
  switchDccChat(msg.session_id);
}

function handleDccChatMsg(msg) {
  const s = state.dccChats[msg.session_id];
  if (!s) return;
  const m = { ts: ts(), nick: s.nick, html: linkify(msg.text), cls: 'notice' };
  s.messages.push(m);
  if (state.activeDccSession !== msg.session_id) {
    s.unread++;
    renderSidebar();
  } else {
    renderMessage(m);
    $messages.scrollTop = $messages.scrollHeight;
  }
}

function handleDccChatClosed(msg) {
  const s = state.dccChats[msg.session_id];
  if (s) {
    s.closed = true;
    const m = { ts: ts(), nick: '●', html: 'Pipe session ended.', cls: 'system' };
    s.messages.push(m);
    if (state.activeDccSession === msg.session_id) {
      renderMessage(m);
      $headerTopic.textContent = 'Session ended';
      $msgInput.placeholder = '(session ended)';
    }
    renderSidebar();
  }
}

// Accept / Decline via event delegation on the messages pane
$messages.addEventListener('click', e => {
  const acceptBtn = e.target.closest('.dcc-accept');
  const declineBtn = e.target.closest('.dcc-decline');
  if (acceptBtn && acceptBtn.tagName !== 'A') { // Only handle the initial accept, not the download link
    const sid = acceptBtn.dataset.sid;
    const kind = acceptBtn.dataset.kind;
    // Replace buttons with progress indicator for file transfers
    const box = document.getElementById(`dcc-offer-${sid}`);
    if (box && kind === 'SEND') {
      const btns = box.querySelector('.dcc-btns');
      btns.outerHTML = `
        <div id="dcc-prog-${sid}">
          <div class="dcc-progress-wrap"><div class="dcc-progress-bar" style="width:0%"></div></div>
          <div class="dcc-status">Piping…</div>
        </div>`;
    } else if (box && kind === 'CHAT') {
      box.querySelector('.dcc-btns').remove();
    }
    sendWs({ type: 'dcc_accept', session_id: sid });
  }
  if (declineBtn) {
    const sid = declineBtn.dataset.sid;
    const box = document.getElementById(`dcc-offer-${sid}`);
    if (box) box.innerHTML = '<div class="dcc-meta" style="color:var(--muted)">Declined.</div>';
    sendWs({ type: 'dcc_decline', session_id: sid });
  }
});

function sendWs(obj) {
  if (state.ws && state.ws.readyState === WebSocket.OPEN) {
    state.ws.send(JSON.stringify(obj));
  }
}

// ── Channel Browser ──────────────────────────────────────
const $browserOverlay = document.getElementById('browser-overlay');
const $browserTbody   = document.getElementById('browser-tbody');
const $browserStatus  = document.getElementById('browser-status');
const $browserSearch  = document.getElementById('browser-search');
const $browserEmpty   = document.getElementById('browser-empty');
const $listBtn        = document.getElementById('list-btn');

function openBrowser() {
  $browserOverlay.classList.add('open');
  if (state.browser.entries.length === 0 && !state.browser.loading) {
    requestList();
  }
}

function closeBrowser() {
  $browserOverlay.classList.remove('open');
}

function requestList() {
  state.browser.entries = [];
  state.browser.loading = true;
  $browserStatus.textContent = 'Piping channels…';
  $browserTbody.innerHTML = '';
  $browserEmpty.style.display = 'none';
  sendRaw('LIST');
}

function renderBrowser() {
  const { entries, sortCol, sortAsc, filter } = state.browser;

  let rows = filter
    ? entries.filter(e =>
        e.name.toLowerCase().includes(filter) ||
        e.topic.toLowerCase().includes(filter))
    : entries;

  rows = [...rows].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ?  1 : -1;
    return 0;
  });

  $browserStatus.textContent =
    `${rows.length} of ${entries.length} channel${entries.length !== 1 ? 's' : ''}`;

  // Update sort indicators
  document.querySelectorAll('#browser-table thead th[data-col]').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === sortCol);
    if (th.dataset.col === sortCol) {
      th.textContent = th.dataset.col.charAt(0).toUpperCase() + th.dataset.col.slice(1) +
        (sortAsc ? ' ▲' : ' ▼');
    } else {
      th.textContent = th.dataset.col.charAt(0).toUpperCase() + th.dataset.col.slice(1);
    }
  });

  $browserEmpty.style.display = rows.length === 0 ? 'block' : 'none';

  $browserTbody.innerHTML = rows.map(e => `
    <tr data-channel="${esc(e.name)}">
      <td class="td-name">${esc(e.name)}</td>
      <td class="td-users">${e.users}</td>
      <td class="td-topic">${esc(e.topic)}</td>
      <td class="td-join"><button class="join-btn" data-channel="${esc(e.name)}">Join</button></td>
    </tr>`).join('');
}

function joinFromBrowser(ch) {
  sendRaw(`JOIN ${ch}`);
  closeBrowser();
}

$browserTbody.addEventListener('click', e => {
  const btn = e.target.closest('.join-btn');
  const row = e.target.closest('tr[data-channel]');
  if (btn) { joinFromBrowser(btn.dataset.channel); return; }
  if (row)  { joinFromBrowser(row.dataset.channel); }
});

document.getElementById('browser-close').addEventListener('click', closeBrowser);
document.getElementById('browser-refresh').addEventListener('click', requestList);

$browserSearch.addEventListener('input', () => {
  state.browser.filter = $browserSearch.value.trim().toLowerCase();
  renderBrowser();
});

document.querySelectorAll('#browser-table thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (state.browser.sortCol === col) {
      state.browser.sortAsc = !state.browser.sortAsc;
    } else {
      state.browser.sortCol = col;
      state.browser.sortAsc = col === 'name';
    }
    renderBrowser();
  });
});

$browserOverlay.addEventListener('click', e => {
  if (e.target === $browserOverlay) closeBrowser();
});

$listBtn.addEventListener('click', () => {
  if (state.connected) openBrowser();
});

// ── Mobile Menu Logic ────────────────────────────────────
const $sidebar = document.getElementById('sidebar');
const $userlistPanel = document.getElementById('userlist-panel');
const $mobileSidebarBtn = document.getElementById('mobile-sidebar-btn');
const $mobileUsersBtn = document.getElementById('mobile-users-btn');

$mobileSidebarBtn.addEventListener('click', () => {
  $sidebar.classList.toggle('open');
  $userlistPanel.classList.remove('open');
});

$mobileUsersBtn.addEventListener('click', () => {
  $userlistPanel.classList.toggle('open');
  $sidebar.classList.remove('open');
});

function closeMobilePanels() {
  $sidebar.classList.remove('open');
  $userlistPanel.classList.remove('open');
}

// Close sidebars if clicking the main chat area
document.getElementById('main').addEventListener('click', (e) => {
  if (!e.target.closest('.mobile-nav-btn')) {
    closeMobilePanels();
  }
});

// Init
renderSidebar();
</script>
